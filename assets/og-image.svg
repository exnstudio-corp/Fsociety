<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid lines -->
  <g stroke="#111111" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#00ff41"/>

  <!-- Top border -->
  <rect x="0" y="0" width="1200" height="1" fill="#1e1e1e"/>
  <!-- Bottom border -->
  <rect x="0" y="629" width="1200" height="1" fill="#1e1e1e"/>

  <!-- Terminal prompt decoration -->
  <text x="60" y="200" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="18" fill="#2a2a2a" letter-spacing="2">
    $ ./fsociety --mode=education --authorized=true
  </text>

  <!-- Main logo -->
  <text x="60" y="320" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="110" fill="#00ff41" letter-spacing="8"
        filter="url(#glow)">F-SOCIETY</text>

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Tagline -->
  <text x="60" y="375" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="22" fill="#888888" letter-spacing="6">
    CYBERSECURITY EDUCATION PLATFORM
  </text>

  <!-- Bottom divider -->
  <rect x="60" y="430" width="120" height="1" fill="#00ff41"/>

  <!-- By EXN Studio -->
  <text x="60" y="460" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="16" fill="#4a4a4a" letter-spacing="4">
    BY EXN STUDIO · exn-fsociety.netlify.app
  </text>

  <!-- Right decorative block -->
  <rect x="960" y="200" width="180" height="1" fill="#1e1e1e"/>
  <text x="970" y="240" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" fill="#2a2a2a">ethical hacking</text>
  <text x="970" y="265" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" fill="#2a2a2a">defensive security</text>
  <text x="970" y="290" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" fill="#2a2a2a">knowledge sharing</text>
  <text x="970" y="315" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="13" fill="#2a2a2a">community learning</text>
  <rect x="960" y="330" width="180" height="1" fill="#1e1e1e"/>

  <!-- Corner markers -->
  <rect x="20" y="20" width="16" height="2" fill="#00ff41" opacity="0.4"/>
  <rect x="20" y="20" width="2" height="16" fill="#00ff41" opacity="0.4"/>
  <rect x="1164" y="20" width="16" height="2" fill="#00ff41" opacity="0.4"/>
  <rect x="1178" y="20" width="2" height="16" fill="#00ff41" opacity="0.4"/>
  <rect x="20" y="608" width="16" height="2" fill="#00ff41" opacity="0.4"/>
  <rect x="20" y="594" width="2" height="16" fill="#00ff41" opacity="0.4"/>
  <rect x="1164" y="608" width="16" height="2" fill="#00ff41" opacity="0.4"/>
  <rect x="1178" y="594" width="2" height="16" fill="#00ff41" opacity="0.4"/>
</svg>
